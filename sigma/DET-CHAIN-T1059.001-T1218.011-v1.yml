title: Encoded PowerShell Followed by LOLBin Execution
id: b3f4a2c1-8e7d-4f91-bc3a-5e2d1f0a9c84
status: test
description: |
    Detects encoded PowerShell execution followed by a LOLBin process within
    a short time window on the same host. This chain is consistent with
    T1059.001 (encoded command obfuscation) pivoting to T1218.011 (signed
    binary proxy execution) for payload delivery or defence evasion.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1218/011/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1059.001/T1059.001.md
author: Bobby Okafor
date: 2025-03-15
modified: 2025-03-15
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1218.011
logsource:
    category: process_creation
    product: windows
detection:
    selection_encoded_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - '-EncodedCommand'
            - '-enc '
            - '-e '
    selection_lolbin:
        Image|endswith:
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\msiexec.exe'
        ParentImage|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    condition: selection_encoded_ps or selection_lolbin
falsepositives:
    - Legitimate administrative scripts using encoded commands for string
      handling or cross-platform compatibility
    - Software deployment tools that invoke rundll32 for COM object registration
    - SCCM / Intune agent activity
level: high
fields:
    - Image
    - ParentImage
    - CommandLine
    - User
    - Computer
